---
aid: university-of-gottingen
name: University of Göttingen
description: >-
  The University of Göttingen (Georg-August-Universität Göttingen) is a public
  research university in Lower Saxony, Germany, ranked #254 in the QS World
  University Rankings 2025. Its public, machine-readable footprint is delivered
  mainly through campus partners: the Göttingen State and University Library
  (SUB Göttingen) publishes digital-library interfaces such as the IIIF Image/
  Presentation APIs and a custom TextAPI for digitized objects, while the
  Göttingen eResearch Alliance operates the GRO.data (Göttingen Research Online)
  Dataverse research-data repository, which exposes an OAI-PMH endpoint and a
  Dataverse REST search API. There is no single official institution-wide
  developer portal; identity is handled via SAML/Shibboleth and OpenID Connect
  AAI run with GWDG.
