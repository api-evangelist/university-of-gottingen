  - date: '2026-06-03'
    rating: 3
    summary: >-
      The University of Göttingen has no single institution-wide developer
      portal, but real, public, documented APIs exist through campus partners.
      Verified live: the GRO.data (Göttingen Research Online) Dataverse
      repository OAI-PMH endpoint and REST search API both return HTTP 200, and
      SUB Göttingen publishes documented IIIF and TextAPI digital-library
      interfaces with open-source code on GitHub (subugoe). The uni-goettingen
      GitHub org exists but is empty/private. Chat AI / SAIA is an OpenAI-
      compatible API but is operated by GWDG/AcademicCloud (a separate shared
      provider), so it is referenced as related infrastructure rather than
      cataloged as a university API. No endpoints were fabricated; only
      confirmed URLs are listed.
    endpoints:
